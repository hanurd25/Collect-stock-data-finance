# Sector baskets. Keep each basket internally comparable — same accounting
# regime and same business model matter more than same country.
#
# VERIFY EVERY TICKER before the first real run:
#   python collect.py --check
# Yahoo suffixes: .OL Oslo, .ST Stockholm, .CO Copenhagen, .HE Helsinki,
# .L London, .PA Paris, .DE Xetra, .MI Milan, .MC Madrid, .AS Amsterdam,
# .BR Brussels, .SW Zurich. No suffix = US.

