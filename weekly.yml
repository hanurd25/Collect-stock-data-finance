name: weekly-fundamentals

on:
  schedule:
    # Saturday 06:00 UTC - markets shut, statements settled, runner queue quiet
    - cron: "0 6 * * 6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fundamentals
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Collect snapshot
        id: collect
        run: python collect.py

      - name: Rebuild panel
        if: steps.collect.outcome == 'success'
        run: python build_panel.py

      - name: Commit
        if: steps.collect.outcome == 'success'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "nothing new"
          else
            git commit -m "snapshot $(date -u +%Y-%m-%d)"
            git pull --rebase --autostash
            git push
          fi
